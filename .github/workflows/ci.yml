name: SQA Social Media Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Backend Tests
        run: mvn -B test
        working-directory: ./api

  frontend-tests:
    name: Frontend Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        working-directory: ./client
        
      - name: Run Jest Tests
        run: npm run test:coverage -- --watchAll=false
        working-directory: ./client

  e2e-tests:
    name: Playwright E2E & API Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: ${{ always() && !cancelled() }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'
          
      - name: Start API
        run: |
          mvn -B spring-boot:run -Dspring-boot.run.profiles=test &
          npx wait-on -t 120000 tcp:127.0.0.1:8080
        working-directory: ./api
        
      - name: Start Client
        run: |
          npm ci
          npm run build
          npm start &
          npx wait-on -t 60000 tcp:127.0.0.1:3000
        working-directory: ./client
        
      - name: Install Playwright Dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium
        working-directory: ./tests
        
      - name: Run Playwright Tests
        run: npm run test
        working-directory: ./tests
        
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
